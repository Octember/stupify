name: Bug report
description: Report incorrect behavior in Stupify.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Keep examples synthetic or public. Do not paste private source code, diffs, filenames, repo URLs, commit messages, author names, or private package names.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Stupify reported..., skipped..., failed to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Use synthetic code or a public fixture when possible.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should Stupify have done?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What did Stupify do instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Stupify Version
      placeholder: "@stupify/cli 0.0.15"
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "macOS 15, Node 24, Bun 1.3.12, llama.cpp b8940"
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Include sanitized logs or JSON output only if safe to share.
