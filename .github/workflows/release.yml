name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-cli:
    name: Publish @stupify/cli
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check package version is unpublished
        run: |
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            EXPECTED_TAG="@stupify/cli@$VERSION"
            ACTUAL_TAG="${{ github.event.release.tag_name }}"
            if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
              echo "Release tag must be $EXPECTED_TAG, got $ACTUAL_TAG."
              exit 1
            fi
          fi
          if npm view "@stupify/cli@$VERSION" version >/dev/null 2>&1; then
            echo "@stupify/cli@$VERSION already exists on npm."
            exit 1
          fi

      - name: Typecheck CLI
        run: bun run typecheck:cli

      - name: Test CLI
        run: bun test packages/cli/test

      - name: Smoke CLI
        run: bun run smoke:cli

      - name: Pack dry run
        run: npm pack --dry-run --json --workspace @stupify/cli

      - name: Publish CLI
        working-directory: packages/cli
        run: npm publish --access public
